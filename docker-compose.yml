services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: contacts
      POSTGRES_PASSWORD: contacts
      POSTGRES_DB: contacts
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contacts -d contacts"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
